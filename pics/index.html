<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            background: black;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            border: 2px solid white;
            max-width: 90vw;
            max-height: 90vh;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <img onclick="nextImage()" id="image" src="./imgs/LeoScarin_studio.png">

    <script>
        const imgList = [
            "./imgs/LeoScarin_studio.png",
            "./imgs/LeoScarin_TouchGrass.png",
            "./imgs/LeoScarin_CAOC.jpg",
            "./imgs/LeoScarin_Fragments.jpg"
        ];

        const image = document.getElementById('image');
        let counter = 0;

        const preloadedImages = [];

        imgList.forEach(src => {
            const img = new Image();
            img.src = src;
            preloadedImages.push(img);
        });

        function nextImage() {
            counter = (counter + 1) % imgList.length;
            image.src = imgList[counter];
        }
    </script>
</body>

</html>
